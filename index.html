<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Maestro — 鏡頭手勢音樂遊戲</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <!--
    舞台層疊(由底到頂):
      1. <video>    相機原始畫面(JS 套水平鏡像 transform)
      2. <canvas>   renderer 在此疊畫雙盤 / 游標 / 高亮 / 氣泡
      3. .ui-*      ui.js 掛載的玻璃控制列 / 提示列 / 開始與錯誤覆蓋層
  -->
  <div class="app" id="app">
    <div class="stage">
      <!-- playsinline + muted:行動裝置與自動播放需求;mirror 由 styles.css/JS 控制 -->
      <video id="cam-video" class="cam-video" playsinline muted autoplay></video>
      <!-- 繪製解析度由 renderer 依 devicePixelRatio 設定,CSS 拉滿舞台 -->
      <canvas id="scene" class="scene"></canvas>
      <div class="vignette" aria-hidden="true"></div>
    </div>

    <!-- 頂部玻璃控制列:ui.js 注入內容(LIVE / 名稱 / scale / key / groove / 音色) -->
    <header id="ui-topbar" class="ui-topbar"></header>

    <!-- 底部提示列:ui.js 注入內容 -->
    <footer id="ui-hint" class="ui-hint"></footer>

    <!-- 覆蓋層:開始按鈕 / 載入態 / 錯誤卡片,ui.js 控制顯示 -->
    <div id="ui-overlay" class="ui-overlay"></div>

    <!--
      直向引導:本 app 是「雙手左右張開」的舞台(左手和弦盤、右手旋律琴鍵),
      座標系統建在 1280×720 橫向設計空間;直向時視覺與手勢映射都會崩。
      故直向時蓋此層引導轉向 —— 純 CSS @media(orientation:portrait) 驅動,
      不依賴 JS(JS 未載入 / 失敗時,直向使用者也立刻看到引導、不撞壞畫面)。
    -->
    <div class="rotate-gate" role="dialog" aria-label="請把裝置轉成橫向">
      <div class="rotate-card">
        <div class="rotate-icon" aria-hidden="true">📱</div>
        <h2 class="rotate-title">請把手機轉成<span>橫向</span></h2>
        <p class="rotate-lead">
          Maestro 是雙手演奏 —— 左手和弦、右手旋律,<br />
          橫向才放得下整個舞台 🎹
        </p>
      </div>
    </div>
  </div>

  <!--
    MediaPipe Hands 為 UMD 函式庫(把建構子掛上全域 window.Hands),不是正規 ESM,
    無法用 Vite 的 `import { Hands }`(打包後會是 undefined)。依官方用法從 CDN 以
    <script> 載入;版本 pin 與 src/handTracking.js 的 ASSET_BASE 一致。
  -->
  <script defer crossorigin="anonymous"
    integrity="sha384-oHwoZ9HyKv5ark5VOH+XWdbNfmhYtptAOBuV8plz6mAfXvTA6d8fULuYllWouEK2"
    src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
